<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MyOrigin.NG</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<script src="https://js.paystack.co/v1/inline.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  color: white;
  background-color: #3E2723;
  background-image: url("https://www.transparenttextures.com/patterns/african-pattern.png");
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 34px;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 25px;
}

input {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 15px;
  background: #8D6E63;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.your {
  color: #4CAF50;
}

.card {
  background: rgba(93,64,55,0.95);
  padding: 18px;
  border-radius: 12px;
  margin-top: 18px;
}

#resultsPage { display: none; }

#paywall {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(20,10,5,0.95);
  display: none;
  justify-content: center;
  align-items: center;
}
</style>
</head>

<body>

<div id="homePage" class="container">
  <h1>MyOrigin.NG</h1>
  <p><strong>Discover Your Roots. Explore Your Ancestry.</strong></p>

  <input id="fname" placeholder="First Name">
  <input id="lname" placeholder="Surname">
  <input id="state" placeholder="State">
  <input id="lga" placeholder="Local Government Area">

  <!-- ✅ FIXED BUTTON -->
  <button onclick="searchHistory()">
    Discover <span class="your">YOUR</span> History
  </button>
</div>

<div id="resultsPage" class="container">
  <h2 id="surnameTitle"></h2>

  <div class="card" id="fnameMeaning"></div>
  <div class="card" id="surnameMeaning"></div>
  <div class="card" id="origin"></div>
  <div class="card" id="context"></div>

  <button onclick="goBack()">← Back</button>
</div>

<div id="paywall">
  <div class="paywall-content">
    <h1>📜 Knowledge comes at a cost</h1>
    <p>Unlock full access for ₦500</p>
    <button onclick="unlockPremium()">Pay ₦500</button>
  </div>
</div>

<script>
async function searchHistory() {
  const firstName = document.getElementById("fname").value;
  const surname = document.getElementById("lname").value;
  const state = document.getElementById("state").value;
  const lga = document.getElementById("lga").value;

  if (!surname) {
    alert("Enter a surname");
    return;
  }

  document.getElementById("surnameTitle").innerHTML = "⏳ Loading...";

  try {
    const res = await fetch("/api/search", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        firstName,
        surname,
        state,
        lga
      })
    });

    const data = await res.json();

    document.getElementById("surnameTitle").innerHTML = surname.toUpperCase();

    // ✅ FIXED IDs
    document.getElementById("fnameMeaning").innerHTML =
      "👤 <strong>First Name Meaning</strong><br><br>" + data.firstNameMeaning;

    document.getElementById("surnameMeaning").innerHTML =
      "📛 <strong>Surname Meaning</strong><br><br>" + data.surnameMeaning;

    document.getElementById("origin").innerHTML =
      "🌍 <strong>Origin</strong><br><br>" + data.origin;

    document.getElementById("context").innerHTML =
      "🧬 <strong>Insight</strong><br><br>" + data.insight;

    document.getElementById("homePage").style.display = "none";
    document.getElementById("resultsPage").style.display = "block";

  } catch (err) {
    console.log(err);
    alert("Server error — check backend");
  }
}

function goBack() {
  document.getElementById("homePage").style.display = "block";
  document.getElementById("resultsPage").style.display = "none";
}
</script>

</body>
</html>
